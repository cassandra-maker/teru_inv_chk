<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f4ef" />
    <title>投資性格診断</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" id="app">
      <section class="screen active" data-screen="intro" aria-labelledby="intro-title">
        <div class="brand">Investment Personality Check</div>
        <h1 id="intro-title">投資性格診断</h1>
        <p class="lead">
          4つの質問から、あなたの投資タイプと相性の良い運用アプローチを診断します。
        </p>

        <form class="entry-form" id="entryForm">
          <label>
            <span>お名前</span>
            <input name="name" type="text" autocomplete="name" placeholder="例：山田 太郎" required />
          </label>
          <label>
            <span>SNSアカウント</span>
            <input name="sns" type="text" inputmode="text" placeholder="例：@your_id" required />
          </label>
          <button class="primary" type="submit">診断をはじめる</button>
        </form>
      </section>

      <section class="screen" data-screen="quiz" aria-live="polite">
        <div class="topbar">
          <button class="ghost" id="backButton" type="button" aria-label="前の質問へ">戻る</button>
          <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
          <span class="step" id="stepLabel">1 / 4</span>
        </div>
        <p class="eyebrow" id="questionEyebrow">Q1</p>
        <h2 id="questionTitle"></h2>
        <div class="choices" id="choices"></div>
      </section>

      <section class="screen" data-screen="result" aria-labelledby="resultTitle">
        <p class="eyebrow">診断結果</p>
        <h2 id="resultTitle"></h2>
        <p class="result-summary" id="resultSummary"></p>

        <dl class="result-details">
          <div>
            <dt>向いている投資手法</dt>
            <dd id="resultMethods"></dd>
          </div>
          <div>
            <dt>おすすめな理由</dt>
            <dd id="resultReason"></dd>
          </div>
          <div>
            <dt>注意すべき落とし穴</dt>
            <dd id="resultCaution"></dd>
          </div>
        </dl>

        <section class="answer-review" aria-labelledby="answerReviewTitle">
          <h3 id="answerReviewTitle">選択した回答</h3>
          <ol id="answerReviewList"></ol>
        </section>

        <section class="stamp-area" aria-labelledby="stampTitle">
          <h3 id="stampTitle">ブース参加スタンプ</h3>
          <img src="ブース参加スタンプ.png" alt="ブース参加スタンプのQRコード" />
        </section>

        <div class="save-state" id="saveState" role="status">回答を保存しています...</div>
        <div class="actions">
          <button class="primary" id="completeButton" type="button">完了</button>
          <button class="secondary" id="restartButton" type="button">もう一度診断する</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
